id: https://w3id.org/reactome-ontology/final
name: reactome_ontology
title: Reactome Ontology Model
description: A final OWL-oriented LinkML schema for generating a clean Reactome ontology.
  This profile keeps ontology-facing classes and properties and removes source-mapping
  annotations, which are maintained in separate mapping files.
license: https://creativecommons.org/licenses/by/4.0/
version: 1.0.0

## ------------
##
## PREFIXES
## ------------
# CURIE namespaces (prefixes/base URI's) mappings of prefixes used in the body of the Biolink Model specification
# are resolved using a specific precedence order, for use in the generation of the Biolink Model context.jsonld
# mappings to namespaces. Any prefixes encountered in the Biolink Model but not resolved by the following
# precedence sources, are anonymously declared by linkml as http://example.org/UNKNOWN/ rooted base URI's
# which should ideally be repaired in one of the precedence lists.
#
# 1. The following 'prefixes:' delimited list has first precedence in resolution.
#
prefixes:
  linkml: https://w3id.org/linkml/
  reactome: https://w3id.org/reactome-ontology/
  reactomeid: https://w3id.org/reactome-ontology/id/
  biolink: https://w3id.org/biolink/vocab/
  GO: http://purl.obolibrary.org/obo/GO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  UniProtKB: http://purl.uniprot.org/uniprot/
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BFO: http://purl.obolibrary.org/obo/BFO_
  RO: http://purl.obolibrary.org/obo/RO_
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  orcid: https://orcid.org/
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: reactome
default_range: string

## ------------
## TYPES
## ------------
imports:
- linkml:types

## ------------
## SLOTS
## ------------
slots:
  id:
    identifier: true
    required: true
    range: string
    description: Unique identifier for an instance in the serialized dataset.
    comments:
    - This may be a local identifier, CURIE, URI, or other serialization key.
    slot_uri: dcterms:identifier
  category:
    designates_type: true
    range: string
    description: Explicit category designator used in serialized instances.
    comments:
    - Useful when data are exchanged in JSON or YAML and class typing must be preserved.
  name:
    range: string
    description: Human-readable primary label for an object.
    comments:
    - Generic reusable naming slot for schema-wide use.
    slot_uri: rdfs:label
  description:
    range: string
    multivalued: false
    description: Free-text textual description of an object.
    comments:
    - Can hold editorial notes, plain-language explanations, or short summaries.
    slot_uri: dcterms:description
  reactome_db_id:
    range: integer
    multivalued: false
    description: Internal Reactome database identifier assigned to a database object.
    comments:
    - Reactome DB_ID values are implementation-oriented identifiers rather than stable
      public identifiers.
    slot_uri: reactome:reactomeDbId
  reactome_stable_identifier:
    range: string
    multivalued: false
    description: Stable public Reactome identifier for an object.
    comments:
    - Typically corresponds to the curated Reactome stable accession such as R-HSA-xxxxx.
    slot_uri: reactome:reactomeStableIdentifier
  source_schema_class:
    range: string
    multivalued: false
    description: Name of the source Reactome schema class from which the instance
      derives.
    comments:
    - Useful when preserving frame-schema provenance or round-tripping with the original
      Reactome graph.
    slot_uri: reactome:sourceSchemaClass
  display_label:
    is_a: name
    range: string
    multivalued: false
    description: Preferred display label used by Reactome for user-facing presentation.
    comments:
    - Often combines identity and contextual state into a concise label.
    slot_uri: reactome:displayLabel
  definition:
    range: string
    multivalued: false
    description: Curated textual definition that states what the object is.
    comments:
    - Intended for conceptual definitions rather than narrative summaries.
    slot_uri: reactome:definition
  systematic_name:
    range: string
    multivalued: false
    description: Formal or systematic name for an entity when available.
    comments:
    - Often useful for chemicals, complexes, or sequence-derived entities.
    slot_uri: reactome:systematicName
  release_date:
    range: date
    multivalued: false
    description: Release date associated with a curation or publication cycle.
    comments:
    - Modeled as string to match Reactome exports; can be normalized later if needed.
    slot_uri: reactome:releaseDate
  release_status:
    range: string
    multivalued: false
    description: Editorial release state of the object in the Reactome release process.
    comments:
    - Examples might include draft-like or released-like status labels depending on
      source exports.
    slot_uri: reactome:releaseStatus
  is_inferred:
    range: boolean
    multivalued: false
    description: Indicates whether an object was computationally inferred rather than
      directly curated.
    comments:
    - Reactome uses inference especially for orthology-based event propagation.
    slot_uri: reactome:isInferred
  is_in_disease_context:
    range: boolean
    multivalued: false
    description: Boolean flag indicating that the represented entity is contextualized
      to a disease state.
    comments:
    - This is a contextual flag and does not by itself define a disease ontology class.
    slot_uri: reactome:isInDiseaseContext
  created:
    range: instance_edit
    multivalued: false
    description: Provenance link to the curation event that originally created the
      object record.
    comments:
    - Usually points to an InstanceEdit containing editor and date metadata.
    slot_uri: reactome:created
  modified:
    range: instance_edit
    multivalued: true
    description: Provenance links to subsequent modifications of the object record.
    comments:
    - Multiple modifications are common across curation history.
    slot_uri: reactome:modified
  reviewed:
    range: instance_edit
    multivalued: true
    description: Provenance links to formal review actions on the object.
    comments:
    - Distinct from simple modification in Reactome curation workflows.
    slot_uri: reactome:reviewed
  revised:
    range: instance_edit
    multivalued: true
    description: Provenance links to explicit revision actions after prior curation
      or review.
    comments:
    - Useful for tracking editorial iteration.
    slot_uri: reactome:revised
  authored:
    range: instance_edit
    multivalued: true
    description: Provenance links capturing authoring actions for the object.
    comments:
    - Included to support richer editorial provenance when present in exports.
    slot_uri: reactome:authored
  in_taxon:
    range: organism_taxon
    multivalued: true
    description: Taxon in which the object, event, or entity is asserted to occur
      or be defined.
    comments:
    - For events this denotes the organism context; for entities it denotes the biological
      source organism.
    slot_uri: reactome:inTaxon
  located_in_compartment:
    range: compartment
    multivalued: true
    description: Compartment in which an entity resides or an event occurs.
    comments:
    - In Reactome, compartment is identity-relevant for many physical entities.
    slot_uri: reactome:locatedInCompartment
  has_summation:
    range: summation
    multivalued: false
    description: Narrative summary object explaining the biology of an event or entity.
    comments:
    - Distinct from formal definition; usually prose intended for readers.
    slot_uri: reactome:hasSummation
  supported_by:
    range: publication
    multivalued: true
    description: Publication supporting the existence, mechanism, or curation of the
      object.
    comments:
    - Often points to PubMed-backed literature references.
    slot_uri: reactome:supportedBy
  has_cross_reference:
    range: database_identifier
    multivalued: true
    description: External cross-reference to another database or controlled resource.
    comments:
    - Used for interoperating with identifiers from GO, ChEBI, UniProt, Ensembl, and
      related resources.
    slot_uri: reactome:hasCrossReference
  has_disease_context:
    range: disease
    multivalued: true
    description: Disease context associated with an event or physical entity.
    comments:
    - Represents contextual disease association rather than broad etiologic modeling.
    slot_uri: reactome:hasDiseaseContext
  has_go_biological_process:
    range: go_biological_process_term
    multivalued: false
    description: GO biological process term associated with a Reactome pathway or
      event.
    comments:
    - Useful as a high-level semantic alignment rather than an exact equivalence in
      all cases.
    slot_uri: reactome:hasGoBiologicalProcess
  has_go_cellular_component:
    range: go_cellular_component_term
    multivalued: false
    description: GO cellular component term associated with a physical entity or event
      context.
    comments:
    - Often complements the explicit compartment modeling in Reactome.
    slot_uri: reactome:hasGoCellularComponent
  has_go_molecular_function:
    range: go_molecular_function_term
    multivalued: false
    description: GO molecular function term asserted in a catalyst activity.
    comments:
    - Reactome reifies catalysis so the molecular function can be attached explicitly.
    slot_uri: reactome:hasGoMolecularFunction
  has_event:
    range: event
    multivalued: true
    inlined_as_list: true
    description: Membership relation linking a pathway to constituent events.
    comments:
    - Pathways in Reactome are curated groupings of events and can overlap with other
      pathways.
    slot_uri: reactome:hasEvent
  preceded_by:
    range: event
    multivalued: true
    inlined_as_list: true
    description: Event that occurs before the current event in a curated process sequence.
    comments:
    - Encodes partial ordering rather than necessarily strict temporal or causal completeness.
    slot_uri: reactome:precededBy
  has_input:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Physical entity consumed, transformed, or otherwise used as an input
      to a reaction-like event.
    comments:
    - Inputs need not always be fully consumed in a strict stoichiometric sense across
      all event subclasses.
    slot_uri: reactome:hasInput
  has_output:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Physical entity produced by a reaction-like event.
    comments:
    - Output identity often reflects new compartment, modification state, or assembly
      state.
    slot_uri: reactome:hasOutput
  requires_component:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Physical entity required for a reaction-like event but not modeled
      as a transforming input.
    comments:
    - Useful for contextual cofactors, platform components, or required participants.
    slot_uri: reactome:requiresComponent
  has_catalyst_activity:
    range: catalyst_activity
    multivalued: true
    inlined_as_list: true
    description: Catalyst activity associated with the reaction-like event.
    comments:
    - A central Reactome modeling pattern that preserves GO molecular function and
      active-unit context.
    slot_uri: reactome:hasCatalystActivity
  has_regulation:
    range: regulation
    multivalued: true
    inlined_as_list: true
    description: Reified regulation assertion attached to an event.
    comments:
    - Supports positive, negative, and requirement-style regulatory semantics.
    slot_uri: reactome:hasRegulation
  has_interacting_entity_on_other_cell:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Physical entity located on another interacting cell in intercellular
      biology.
    comments:
    - Useful for immune, adhesion, and receptor-ligand interaction contexts.
    slot_uri: reactome:hasInteractingEntityOnOtherCell
  has_interaction:
    range: interaction
    multivalued: true
    inlined_as_list: true
    description: Associated interaction object linked to an event.
    comments:
    - Preserves interaction-level detail when Reactome models such assertions explicitly.
    slot_uri: reactome:hasInteraction
  has_reaction_type:
    range: reaction_type_term
    multivalued: true
    description: Controlled reaction type annotation describing the mechanistic or
      editorial type of a reaction.
    comments:
    - Useful for grouping reaction-like events into broad mechanistic categories.
    slot_uri: reactome:hasReactionType
  has_reference_entity:
    range: reference_entity
    multivalued: false
    description: Invariant reference identity underlying a contextualized physical
      entity.
    comments:
    - One of the key distinctions in Reactome: reference identity is separate from
        stateful physical instantiation.
    slot_uri: reactome:hasReferenceEntity
  has_modified_residue:
    range: abstract_modified_residue
    multivalued: true
    inlined_as_list: true
    description: Modified residue feature borne by a sequence-based physical entity.
    comments:
    - Supports phosphorylation, cleavage, ubiquitination, and related residue-level
      state modeling.
    slot_uri: reactome:hasModifiedResidue
  start_coordinate:
    range: integer
    multivalued: false
    description: Start coordinate of a subsequence, fragment, or feature-bearing region
      on a sequence entity.
    comments:
    - Useful for proteolytic fragments, domains, and sequence-trimmed entity forms.
    slot_uri: reactome:startCoordinate
  end_coordinate:
    range: integer
    multivalued: false
    description: End coordinate of a subsequence, fragment, or feature-bearing region
      on a sequence entity.
    comments:
    - Typically paired with start_coordinate.
    slot_uri: reactome:endCoordinate
  sequence_reference_type:
    range: string
    multivalued: false
    description: Textual qualifier for the kind of referenced sequence or entity.
    comments:
    - Included for compatibility with Reactome exports.
    slot_uri: reactome:sequenceReferenceType
  has_component:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Component physical entities that make up a complex.
    comments:
    - Complex identity is distinct from component identity in Reactome.
    slot_uri: reactome:hasComponent
  has_member:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Members of an entity set representing functionally interchangeable
      participants.
    comments:
    - Entity sets are curated graph objects, not simply OWL classes over their members.
    slot_uri: reactome:hasMember
  has_repeated_unit:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Repeated unit composing a polymer entity.
    comments:
    - Used when Reactome models a polymer abstractly in terms of repeating constituents.
    slot_uri: reactome:hasRepeatedUnit
  has_regulator:
    range: physical_entity
    multivalued: false
    description: Physical entity that exerts regulatory influence on a regulated event.
    comments:
    - May be a protein, complex, small molecule, set, or other physical entity.
    slot_uri: reactome:hasRegulator
  regulates:
    range: reaction_like_event
    multivalued: false
    description: Reaction-like event that is the target of regulation.
    comments:
    - Kept explicit through reified regulation nodes rather than flattened triples.
    slot_uri: reactome:regulates
  has_active_unit:
    range: physical_entity
    multivalued: true
    inlined_as_list: true
    description: Subunit, domain-bearing fragment, or active molecular portion responsible
      for catalytic or regulatory activity.
    comments:
    - Reactome can attach active-unit detail to catalyst activities and regulation
      objects.
    slot_uri: reactome:hasActiveUnit
  has_catalyst:
    range: physical_entity
    multivalued: false
    description: Physical entity serving as the bearer of a catalyst activity.
    comments:
    - Used inside reified catalyst activity objects.
    slot_uri: reactome:hasCatalyst
  catalyzes:
    range: reaction_like_event
    multivalued: true
    inlined_as_list: true
    description: Reaction-like event catalyzed by the given catalyst activity.
    comments:
    - Allows one catalyst activity node to connect molecular function and event participation.
    slot_uri: reactome:catalyzes
  has_reference_database:
    range: reference_database
    multivalued: false
    description: Reference database authority associated with a reference entity or
      database identifier.
    comments:
    - Provides the namespace and interpretation context for an identifier.
    slot_uri: reactome:hasReferenceDatabase
  identifier:
    range: string
    multivalued: false
    description: Identifier string assigned by an external reference database.
    comments:
    - Examples include UniProt accessions, ChEBI identifiers, or GO term identifiers.
    slot_uri: reactome:identifier
  access_url:
    range: uri
    multivalued: false
    description: URL template or access URL used to resolve an identifier in a reference
      database.
    comments:
    - Can encode direct or templated resolver behavior.
    slot_uri: reactome:accessUrl
  identifier_prefix:
    range: string
    multivalued: false
    description: Prefix or namespace abbreviation used by a reference database.
    comments:
    - Useful for CURIE generation and namespace harmonization.
    slot_uri: reactome:identifierPrefix
  resource_identifier:
    range: string
    multivalued: false
    description: Identifier for the reference resource itself rather than for entries
      inside it.
    comments:
    - Supports metadata about the authority record for a database.
    slot_uri: reactome:resourceIdentifier
  url:
    range: uri
    multivalued: false
    description: General URL associated with an object.
    comments:
    - Often used for resource metadata pages or resolver entry points.
    slot_uri: reactome:url
  pubmed_id:
    range: string
    multivalued: false
    description: PubMed identifier for a literature reference.
    comments:
    - Stored as string for broad interoperability with exports and loaders.
    slot_uri: reactome:pubmedId
    pattern: ^[0-9]+$
  orcid:
    range: uri
    multivalued: false
    description: ORCID identifier for a person involved in curation or authorship.
    comments:
    - Useful for curator and contributor disambiguation.
    slot_uri: reactome:orcid
  ncbi_taxon_id:
    range: string
    multivalued: false
    description: Taxonomic identifier, typically aligned to the NCBI Taxonomy.
    comments:
    - Often used on species or taxon-like records.
    slot_uri: reactome:ncbiTaxonId
    pattern: ^[0-9]+$
  previous_stable_identifier:
    range: string
    multivalued: false
    description: Deprecated or previous stable Reactome identifier retained for traceability.
    comments:
    - Useful during migration, identifier replacement, and legacy resolution.
    slot_uri: reactome:previousStableIdentifier

## ------------
## CLASSES
## ------------
classes:
  named_entity:
    abstract: true
    description: Generic named entity used as a lightweight semantic root for serializable
      objects.
    comments:
    - Provides reusable identifier, naming, and descriptive slots independent of the
      Reactome-specific hierarchy.
    slots:
    - id
    - name
    - description
    class_uri: reactome:NamedEntity
  database_object:
    is_a: named_entity
    description: Root class for most Reactome schema objects and the main provenance-bearing
      superclass.
    comments:
    - Reactome’s frame-based model uses DatabaseObject as the common ancestor for
      curated graph records.
    class_uri: reactome:DatabaseObject
    slots:
    - reactome_db_id
    - reactome_stable_identifier
    - source_schema_class
    - display_label
    - definition
    - previous_stable_identifier
    - created
    - modified
    slot_usage:
      reactome_db_id:
        required: true
      reactome_stable_identifier:
        required: true
      source_schema_class:
        required: true
      display_label:
        required: true
      created:
        required: true
  instance_edit:
    is_a: database_object
    description: Provenance record describing a curation action such as creation,
      modification, review, or revision.
    comments:
    - Typically stores who performed an edit and when the edit occurred.
    class_uri: reactome:InstanceEdit
    attributes:
      date:
        range: datetime
        description: Timestamp or date string for the edit activity.
      author:
        range: person
        multivalued: true
        inlined_as_list: true
        description: Person or people responsible for the edit activity.
  publication:
    is_a: database_object
    abstract: true
    description: Publication record used as evidence or supporting documentation for
      curated biology.
    comments:
    - Abstract superclass for specific publication-like records.
    class_uri: reactome:Publication
  literature_reference:
    is_a: publication
    description: Literature citation record, commonly representing a PubMed-indexed
      paper supporting a Reactome assertion.
    comments:
    - Used widely to ground events, regulations, and catalyst activities in the literature.
    class_uri: reactome:LiteratureReference
    slots:
    - pubmed_id
  person:
    is_a: database_object
    description: Person record used primarily for provenance, authorship, and curation
      attribution.
    comments:
    - May represent curators, reviewers, or contributors.
    class_uri: reactome:Person
    slots:
    - orcid
  summation:
    is_a: database_object
    description: Narrative summary record containing prose that explains the biological
      meaning of an entity or event.
    comments:
    - Distinct from a formal definition; meant for human reading.
    class_uri: reactome:Summation
    attributes:
      text:
        range: string
        required: true
        description: Narrative summary text.
  event:
    is_a: database_object
    abstract: true
    description: Biological occurrence or process unit in Reactome, covering both
      pathways and reaction-like events.
    comments:
    - Event is one of the central abstractions in the Reactome model.
    class_uri: reactome:Event
    slots:
    - in_taxon
    - located_in_compartment
    - has_summation
    - has_cross_reference
    - has_disease_context
    - supported_by
    - reviewed
    - revised
    - release_date
    - release_status
    - is_inferred
  pathway:
    is_a: event
    description: Curated grouping of biologically related events representing a pathway
      or pathway-like module.
    comments:
    - Pathways can overlap; event membership is not exclusive.
    class_uri: reactome:Pathway
    slots:
    - has_event
    - has_go_biological_process
    slot_usage:
      has_event:
        required: true
  reaction_like_event:
    is_a: event
    abstract: true
    description: Event in which physical entities participate as inputs, outputs,
      regulators, or catalysts in a transformation-like process.
    comments:
    - Covers canonical reactions as well as black-box and polymerization-style event
      subclasses.
    class_uri: reactome:ReactionLikeEvent
    slots:
    - has_input
    - has_output
    - requires_component
    - has_catalyst_activity
    - has_regulation
    - preceded_by
    - has_interacting_entity_on_other_cell
    - has_interaction
    - has_reaction_type
  reaction:
    is_a: reaction_like_event
    description: Standard reaction-like event with explicit transformed inputs and
      outputs.
    comments:
    - Best used for relatively well-resolved mechanistic conversions.
    class_uri: reactome:Reaction
    slot_usage:
      has_input:
        required: true
      has_output:
        required: true
  black_box_event:
    is_a: reaction_like_event
    description: Reaction-like event included in the pathway model despite incomplete
      mechanistic detail.
    comments:
    - Useful when biological evidence supports the event but not a full molecular
      mechanism.
    class_uri: reactome:BlackBoxEvent
  polymerization:
    is_a: reaction_like_event
    description: Event representing formation of a polymer from repeated or assembling
      units.
    comments:
    - Kept distinct because its participant semantics can differ from ordinary reaction
      balance.
    class_uri: reactome:Polymerization
  depolymerization:
    is_a: reaction_like_event
    description: Event representing breakdown of a polymer into constituent or smaller
      units.
    comments:
    - Complementary to polymerisation.
    class_uri: reactome:Depolymerization
  physical_entity:
    is_a: database_object
    abstract: true
    description: Concrete biological participant whose identity reflects both underlying
      molecular identity and contextual state.
    comments:
    - In Reactome, compartment, modification state, and assembly state can distinguish
      one physical entity from another.
    class_uri: reactome:PhysicalEntity
    slots:
    - in_taxon
    - located_in_compartment
    - has_cross_reference
    - has_disease_context
    - has_go_cellular_component
    - systematic_name
    - is_in_disease_context
  simple_entity:
    is_a: physical_entity
    description: Simple molecular entity, typically a small molecule or other non-sequence-based
      chemical participant.
    comments:
    - Commonly aligned to ChEBI-like reference identities through ReferenceMolecule.
    class_uri: reactome:SimpleEntity
    slots:
    - has_reference_entity
    slot_usage:
      has_reference_entity:
        required: true
        range: reference_molecule
  genome_encoded_entity:
    is_a: physical_entity
    description: Physical entity whose existence is grounded in a genome-encoded product
      such as a protein or nucleic acid.
    comments:
    - Serves as a superclass for accessioned sequence-based entities.
    class_uri: reactome:GenomeEncodedEntity
  sequence_entity:
    is_a: genome_encoded_entity
    description: Sequence-bearing physical entity linked to a stable reference sequence
      and optionally decorated with residue modifications and subsequence coordinates.
    comments:
    - Core Reactome pattern for proteins, RNAs, and other accessioned biomolecules
      in specific states.
    class_uri: reactome:SequenceEntity
    slots:
    - has_reference_entity
    - has_modified_residue
    - start_coordinate
    - end_coordinate
    - sequence_reference_type
    slot_usage:
      has_reference_entity:
        required: true
        range: reference_sequence
  complex:
    is_a: physical_entity
    description: Physical entity composed of two or more component physical entities
      assembled into a functional complex.
    comments:
    - The complex is treated as an entity distinct from its components.
    class_uri: reactome:Complex
    slots:
    - has_component
    slot_usage:
      has_component:
        required: true
  entity_set:
    is_a: physical_entity
    description: Curated set of physical entities that are treated as functionally
      interchangeable in a given biological context.
    comments:
    - This is a graph object representing a curated set, not merely a class extension
      over its members.
    class_uri: reactome:EntitySet
    slots:
    - has_member
    slot_usage:
      has_member:
        required: true
  candidate_set:
    is_a: entity_set
    description: Entity set whose members are candidates for fulfilling a shared biological
      role.
    comments:
    - Often reflects partial knowledge or broad functional grouping.
    class_uri: reactome:CandidateSet
  defined_set:
    is_a: entity_set
    description: Entity set whose members are explicitly curated as the intended interchangeable
      participants.
    comments:
    - Stronger editorial commitment than a candidate set.
    class_uri: reactome:DefinedSet
  polymer:
    is_a: physical_entity
    description: Polymer entity abstracted in terms of one or more repeated units.
    comments:
    - Useful for biological polymers that are not modeled by enumerating every monomer
      instance.
    class_uri: reactome:Polymer
    slots:
    - has_repeated_unit
  cell:
    is_a: physical_entity
    description: Cell or cell-like biological unit treated as a physical participant
      in an event.
    comments:
    - Included for cases where cells themselves are modeled as interacting biological
      entities.
    class_uri: reactome:Cell
  other_entity:
    is_a: physical_entity
    description: Catch-all physical entity class for biologically relevant participants
      not covered by more specific subclasses.
    comments:
    - Helps preserve source fidelity when Reactome uses residual categorization.
    class_uri: reactome:OtherEntity
  drug:
    is_a: physical_entity
    description: Therapeutic or intervention-oriented physical entity modeled in the
      Reactome graph.
    comments:
    - Drug subclasses distinguish broad molecular kinds of therapeutic agents.
    class_uri: reactome:Drug
  chemical_drug:
    is_a: drug
    description: Drug represented primarily as a chemical or small-molecule therapeutic
      agent.
    comments:
    - Often alignable to small-molecule reference identities.
    class_uri: reactome:ChemicalDrug
  protein_drug:
    is_a: drug
    description: Drug represented as a protein therapeutic or protein-derived biologic.
    comments:
    - Includes antibody-like or recombinant protein therapeutics when modeled as physical
      entities.
    class_uri: reactome:ProteinDrug
  rna_drug:
    is_a: drug
    description: Drug represented as an RNA-based therapeutic agent.
    comments:
    - Can cover antisense, siRNA, or related RNA therapeutic modalities.
    class_uri: reactome:RnaDrug
  reference_entity:
    is_a: database_object
    abstract: true
    description: Invariant reference identity used to connect multiple contextualized
      physical entities that share an underlying molecular identity.
    comments:
    - This is the key abstraction Reactome uses to separate contextual state from
      canonical identity.
    class_uri: reactome:ReferenceEntity
    slots:
    - has_reference_database
    - identifier
    slot_usage:
      has_reference_database:
        required: true
  reference_sequence:
    is_a: reference_entity
    description: Reference identity for a sequence-bearing biomolecule.
    comments:
    - Commonly used for protein, DNA, RNA, and isoform references.
    class_uri: reactome:ReferenceSequence
  reference_gene_product:
    is_a: reference_sequence
    description: Reference sequence corresponding to a gene product, typically protein-centric.
    comments:
    - Often alignable to UniProt entries for proteins.
    class_uri: reactome:ReferenceGeneProduct
  reference_isoform:
    is_a: reference_sequence
    description: Reference sequence representing a specific isoform-level identity.
    comments:
    - Useful when isoform distinction matters biologically.
    class_uri: reactome:ReferenceIsoform
  reference_dna_sequence:
    is_a: reference_sequence
    description: Reference identity for a DNA sequence.
    comments:
    - Supports DNA-centric entities in the Reactome schema.
    class_uri: reactome:ReferenceDnaSequence
  reference_rna_sequence:
    is_a: reference_sequence
    description: Reference identity for an RNA sequence.
    comments:
    - Supports transcript and RNA molecule identity modeling.
    class_uri: reactome:ReferenceRnaSequence
  reference_molecule:
    is_a: reference_entity
    description: Reference identity for a small molecule, simple chemical, or chemically
      grounded participant.
    comments:
    - Naturally alignable to ChEBI-like references.
    class_uri: reactome:ReferenceMolecule
  reference_group:
    is_a: reference_entity
    description: Grouped reference identity used when an invariant identity is represented
      at a grouped rather than single-entry level.
    comments:
    - Useful for families or grouped reference semantics in source data.
    class_uri: reactome:ReferenceGroup
  reference_therapeutic:
    is_a: reference_entity
    description: Reference identity for a therapeutic or intervention-oriented entity.
    comments:
    - Supports the reference-layer counterpart of drug-like modeled entities.
    class_uri: reactome:ReferenceTherapeutic
  reference_database:
    is_a: database_object
    description: Metadata record describing an external database or authority used
      for identifiers and cross-references.
    comments:
    - Holds resolver and namespace information for identifier interpretation.
    class_uri: reactome:ReferenceDatabase
    slots:
    - access_url
    - identifier_prefix
    - resource_identifier
    - url
  database_identifier:
    is_a: database_object
    description: Cross-reference record that pairs an identifier string with a reference
      database authority.
    comments:
    - Useful as a reified identifier object rather than a bare literal.
    class_uri: reactome:DatabaseIdentifier
    slots:
    - identifier
    - has_reference_database
  catalyst_activity:
    is_a: database_object
    description: Reified catalytic assertion connecting a catalyst bearer, a GO molecular
      function, and one or more catalyzed reaction-like events.
    comments:
    - This is one of the most semantically important reified node types in Reactome.
    class_uri: reactome:CatalystActivity
    slots:
    - has_catalyst
    - has_go_molecular_function
    - has_active_unit
    - catalyzes
    - supported_by
    slot_usage:
      has_catalyst:
        required: true
      has_go_molecular_function:
        required: true
  regulation:
    is_a: database_object
    abstract: true
    description: Reified regulatory assertion linking a regulator physical entity
      to a regulated reaction-like event.
    comments:
    - Reactome models regulation explicitly instead of flattening it into a simple
      binary relation.
    class_uri: reactome:Regulation
    slots:
    - has_regulator
    - regulates
    - has_active_unit
    - supported_by
    slot_usage:
      has_regulator:
        required: true
      regulates:
        required: true
  positive_regulation:
    is_a: regulation
    description: Regulation that increases, enables, or positively influences the
      occurrence or efficiency of a reaction-like event.
    comments:
    - Semantic polarity is explicit at the class level.
    class_uri: reactome:PositiveRegulation
  negative_regulation:
    is_a: regulation
    description: Regulation that decreases, inhibits, or negatively influences the
      occurrence or efficiency of a reaction-like event.
    comments:
    - Semantic polarity is explicit at the class level.
    class_uri: reactome:NegativeRegulation
  requirement:
    is_a: regulation
    description: Regulation-like assertion indicating that a regulator or participant
      is required for a reaction-like event to occur.
    comments:
    - Used when necessity is the key biological relation rather than positive or negative
      modulation.
    class_uri: reactome:Requirement
  interaction:
    is_a: database_object
    description: Interaction record associated with an event or set of participants.
    comments:
    - Retained as a distinct object to preserve graph fidelity when interactions are
      explicitly modeled.
    class_uri: reactome:Interaction
  reaction_type_term:
    is_a: database_object
    description: Controlled vocabulary term used to characterize a reaction-like event.
    comments:
    - Supports editorial or mechanistic grouping of reaction events.
    class_uri: reactome:ReactionTypeTerm
  abstract_modified_residue:
    is_a: database_object
    description: Feature record describing a modified residue or residue-level state
      on a sequence-bearing entity.
    comments:
    - Abstract superclass for phosphorylation-like or other residue modification records.
    class_uri: reactome:AbstractModifiedResidue
  organism_taxon:
    is_a: database_object
    description: Organism taxon record representing the organismal context for entities
      and events.
    comments:
    - Often associated with taxonomy identifiers and may correspond to NCBI Taxonomy
      concepts.
    class_uri: reactome:OrganismTaxon
    slots:
    - ncbi_taxon_id
  taxon:
    is_a: database_object
    description: Taxonomic concept used for taxonomic assignment or metadata.
    comments:
    - Can be used in parallel with or beneath species-oriented records.
    class_uri: reactome:Taxon
    slots:
    - ncbi_taxon_id
  compartment:
    is_a: database_object
    description: Cellular or subcellular location object used to state where an event
      occurs or where a physical entity resides.
    comments:
    - Often alignable to GO cellular component terms, though not always identical
      in role.
    class_uri: reactome:Compartment
  disease:
    is_a: database_object
    description: Disease concept used to contextualize events and entities in pathological
      settings.
    comments:
    - Represents disease context rather than a full disease ontology commitment.
    class_uri: reactome:Disease
  go_molecular_function_term:
    is_a: database_object
    description: Wrapper object for a GO molecular function term used in Reactome
      catalysis modeling.
    comments:
    - Particularly important in CatalystActivity.
    class_uri: reactome:GoMolecularFunctionTerm
  go_biological_process_term:
    is_a: database_object
    description: Wrapper object for a GO biological process term used for pathway
      or event alignment.
    comments:
    - Useful for crosswalks between Reactome pathways and GO process knowledge.
    class_uri: reactome:GoBiologicalProcessTerm
  go_cellular_component_term:
    is_a: database_object
    description: Wrapper object for a GO cellular component term used in entity or
      location annotation.
    comments:
    - Often complements explicit compartment modeling.
    class_uri: reactome:GoCellularComponentTerm
  reactome_dataset:
    tree_root: true
    description: Top-level container for a serialized Reactome dataset excerpt or
      export package.
    comments:
    - Provides a practical root object for JSON and YAML instance data.
    attributes:
      database_objects:
        range: database_object
        multivalued: true
        inlined: true
        inlined_as_list: false
        description: Collection of Reactome objects keyed by identifier.
comments:
- This schema favors ontology-oriented naming for OWL generation; source mappings
  are maintained in separate mapping files.
- Administrative and serialization helper fields are retained for round-tripping but
  may be omitted from OWL export profiles.
- Inverse-style helper relations have been removed from the ontology-facing profile
  in favor of canonical relations.
