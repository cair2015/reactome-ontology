---
site_name: "Reactome Ontology Model"
theme:
  name: material
  icon:
    logo: material/book-open-page-variant
  features:
    - content.tabs.link
    - header.autohide
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - search.suggest
    - content.code.copy

extra_css:
  []
extra_javascript: []

plugins:
  - search
  - mknotebooks:
      execute: false
  - mermaid2:
      version: 11.4.1
  - mkdocs_pymdownx_material_extras:
    # https://pypi.org/project/mkdocs-pymdownx-material-extras

markdown_extensions:
  - pymdownx.superfences:
      # https://mkdocs-mermaid2.readthedocs.io/en/latest/superfences
      # custom code highlighting rules
      custom_fences:
        - name: mermaid
          # disable code highlighting to display diagrams
          format: !!python/name:pymdownx.superfences.fence_code_format
          class: mermaid

  # TODO rebuild docs on schema change (https://github.com/dalito/linkml-project-copier/issues/39)
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

watch:
  - src/reactome_ontology/schema

nav:
  - Overview: elements/index.md
  - Ontology Artifacts: ontology.md
  - About: about.md

exclude_docs: |
  /templates-linkml/

site_url: https://cair2015.github.io/reactome-ontology
repo_url: https://github.com/cair2015/reactome-ontology

# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
