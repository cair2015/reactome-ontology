    range: reference_molecule
    required: true
    multivalued: false
  sequence_entity_has_reference_entity:
    name: sequence_entity_has_reference_entity
    definition_uri: https://w3id.org/reactome-ontology/has_reference_entity
    description: Invariant reference identity underlying a contextualized physical
      entity.
    comments:
    - '{''One of the key distinctions in Reactome'': ''reference identity is separate
      from stateful physical instantiation.''}'
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasReferenceEntity
    is_a: has_reference_entity
    domain: sequence_entity
    slot_uri: reactomeo:hasReferenceEntity
    alias: has_reference_entity
    owner: sequence_entity
    domain_of:
    - sequence_entity
    is_usage_slot: true
    usage_slot_name: has_reference_entity
    range: reference_sequence
    required: true
    multivalued: false
  complex_has_component:
    name: complex_has_component
    definition_uri: https://w3id.org/reactome-ontology/has_component
    description: Component physical entities that make up a complex.
    comments:
    - Complex identity is distinct from component identity in Reactome.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasComponent
    is_a: has_component
    domain: complex
    slot_uri: reactomeo:hasComponent
    alias: has_component
