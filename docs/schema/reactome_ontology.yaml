name: reactome_ontology_final
description: A final OWL-oriented LinkML schema for generating a clean Reactome ontology.
  This profile keeps ontology-facing classes and properties and removes source-mapping
  annotations, which are maintained in separate mapping files.
title: Reactome Ontology Schema (Final OWL-oriented Profile)
comments:
- This schema favors ontology-oriented naming for OWL generation; source mappings
  are maintained in separate mapping files.
- Administrative and serialization helper fields are retained for round-tripping but
  may be omitted from OWL export profiles.
- Inverse-style helper relations have been removed from the ontology-facing profile
  in favor of canonical relations.
id: https://w3id.org/reactome-ontology/final
version: 1.0.0
imports:
- linkml:types
license: https://creativecommons.org/licenses/by/4.0/
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  reactome:
    prefix_prefix: reactome
    prefix_reference: https://w3id.org/reactome-ontology/
  reactomeid:
    prefix_prefix: reactomeid
    prefix_reference: https://w3id.org/reactome-ontology/id/
  biolink:
    prefix_prefix: biolink
    prefix_reference: https://w3id.org/biolink/vocab/
  GO:
    prefix_prefix: GO
    prefix_reference: http://purl.obolibrary.org/obo/GO_
  CHEBI:
    prefix_prefix: CHEBI
    prefix_reference: http://purl.obolibrary.org/obo/CHEBI_
  UniProtKB:
    prefix_prefix: UniProtKB
    prefix_reference: http://purl.uniprot.org/uniprot/
  NCBITaxon:
    prefix_prefix: NCBITaxon
    prefix_reference: http://purl.obolibrary.org/obo/NCBITaxon_
  BFO:
    prefix_prefix: BFO
    prefix_reference: http://purl.obolibrary.org/obo/BFO_
  RO:
    prefix_prefix: RO
    prefix_reference: http://purl.obolibrary.org/obo/RO_
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  orcid:
    prefix_prefix: orcid
    prefix_reference: https://orcid.org/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  reactomeo:
    prefix_prefix: reactomeo
    prefix_reference: https://w3id.org/reactome-ontology/
default_prefix: reactomeo
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
slots:
  id:
    name: id
    definition_uri: https://w3id.org/reactome-ontology/id
    description: Unique identifier for an instance in the serialized dataset.
    comments:
    - This may be a local identifier, CURIE, URI, or other serialization key.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - dcterms:identifier
    slot_uri: dcterms:identifier
    identifier: true
    owner: named_entity
    domain_of:
    - named_entity
    range: string
    required: true
  category:
    name: category
    definition_uri: https://w3id.org/reactome-ontology/category
    description: Explicit category designator used in serialized instances.
    comments:
    - Useful when data are exchanged in JSON or YAML and class typing must be preserved.
    from_schema: https://w3id.org/reactome-ontology/final
    slot_uri: reactomeo:category
    designates_type: true
    range: string
  name:
    name: name
    definition_uri: https://w3id.org/reactome-ontology/name
    description: Human-readable primary label for an object.
    comments:
    - Generic reusable naming slot for schema-wide use.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - rdfs:label
    slot_uri: rdfs:label
    owner: named_entity
    domain_of:
    - named_entity
    range: string
  description:
    name: description
    definition_uri: https://w3id.org/reactome-ontology/description
    description: Free-text textual description of an object.
    comments:
    - Can hold editorial notes, plain-language explanations, or short summaries.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - dcterms:description
    slot_uri: dcterms:description
    owner: named_entity
    domain_of:
    - named_entity
    range: string
    multivalued: false
  reactome_db_id:
    name: reactome_db_id
    definition_uri: https://w3id.org/reactome-ontology/reactome_db_id
    description: Internal Reactome database identifier assigned to a database object.
    comments:
    - Reactome DB_ID values are implementation-oriented identifiers rather than stable
      public identifiers.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:reactomeDbId
    slot_uri: reactomeo:reactomeDbId
    owner: database_object
    domain_of:
    - database_object
    range: integer
    multivalued: false
  reactome_stable_identifier:
    name: reactome_stable_identifier
    definition_uri: https://w3id.org/reactome-ontology/reactome_stable_identifier
    description: Stable public Reactome identifier for an object.
    comments:
    - Typically corresponds to the curated Reactome stable accession such as R-HSA-xxxxx.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:reactomeStableIdentifier
    slot_uri: reactomeo:reactomeStableIdentifier
    owner: database_object
    domain_of:
    - database_object
    range: string
    multivalued: false
  source_schema_class:
    name: source_schema_class
    definition_uri: https://w3id.org/reactome-ontology/source_schema_class
    description: Name of the source Reactome schema class from which the instance
      derives.
    comments:
    - Useful when preserving frame-schema provenance or round-tripping with the original
      Reactome graph.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:sourceSchemaClass
    slot_uri: reactomeo:sourceSchemaClass
    owner: database_object
    domain_of:
    - database_object
    range: string
    multivalued: false
  display_label:
    name: display_label
    definition_uri: https://w3id.org/reactome-ontology/display_label
    description: Preferred display label used by Reactome for user-facing presentation.
    comments:
    - Often combines identity and contextual state into a concise label.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:displayLabel
    is_a: name
    slot_uri: reactomeo:displayLabel
    owner: database_object
    domain_of:
    - database_object
    range: string
    multivalued: false
  definition:
    name: definition
    definition_uri: https://w3id.org/reactome-ontology/definition
    description: Curated textual definition that states what the object is.
    comments:
    - Intended for conceptual definitions rather than narrative summaries.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:definition
    slot_uri: reactomeo:definition
    owner: database_object
    domain_of:
    - database_object
    range: string
    multivalued: false
  systematic_name:
    name: systematic_name
    definition_uri: https://w3id.org/reactome-ontology/systematic_name
    description: Formal or systematic name for an entity when available.
    comments:
    - Often useful for chemicals, complexes, or sequence-derived entities.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:systematicName
    slot_uri: reactomeo:systematicName
    owner: physical_entity
    domain_of:
    - physical_entity
    range: string
    multivalued: false
  release_date:
    name: release_date
    definition_uri: https://w3id.org/reactome-ontology/release_date
    description: Release date associated with a curation or publication cycle.
    comments:
    - Modeled as string to match Reactome exports; can be normalized later if needed.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:releaseDate
    slot_uri: reactomeo:releaseDate
    owner: event
    domain_of:
    - event
    range: date
    multivalued: false
  release_status:
    name: release_status
    definition_uri: https://w3id.org/reactome-ontology/release_status
    description: Editorial release state of the object in the Reactome release process.
    comments:
    - Examples might include draft-like or released-like status labels depending on
      source exports.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:releaseStatus
    slot_uri: reactomeo:releaseStatus
    owner: event
    domain_of:
    - event
    range: string
    multivalued: false
  is_inferred:
    name: is_inferred
    definition_uri: https://w3id.org/reactome-ontology/is_inferred
    description: Indicates whether an object was computationally inferred rather than
      directly curated.
    comments:
    - Reactome uses inference especially for orthology-based event propagation.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:isInferred
    slot_uri: reactomeo:isInferred
    owner: event
    domain_of:
    - event
    range: boolean
    multivalued: false
  is_in_disease_context:
    name: is_in_disease_context
    definition_uri: https://w3id.org/reactome-ontology/is_in_disease_context
    description: Boolean flag indicating that the represented entity is contextualized
      to a disease state.
    comments:
    - This is a contextual flag and does not by itself define a disease ontology class.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:isInDiseaseContext
    slot_uri: reactomeo:isInDiseaseContext
    owner: physical_entity
    domain_of:
    - physical_entity
    range: boolean
    multivalued: false
  created:
    name: created
    definition_uri: https://w3id.org/reactome-ontology/created
    description: Provenance link to the curation event that originally created the
      object record.
    comments:
    - Usually points to an InstanceEdit containing editor and date metadata.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:created
    slot_uri: reactomeo:created
    owner: database_object
    domain_of:
    - database_object
    range: instance_edit
    multivalued: false
  modified:
    name: modified
    definition_uri: https://w3id.org/reactome-ontology/modified
    description: Provenance links to subsequent modifications of the object record.
    comments:
    - Multiple modifications are common across curation history.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:modified
    slot_uri: reactomeo:modified
    owner: database_object
    domain_of:
    - database_object
    range: instance_edit
    multivalued: true
  reviewed:
    name: reviewed
    definition_uri: https://w3id.org/reactome-ontology/reviewed
    description: Provenance links to formal review actions on the object.
    comments:
    - Distinct from simple modification in Reactome curation workflows.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:reviewed
    slot_uri: reactomeo:reviewed
    owner: event
    domain_of:
    - event
    range: instance_edit
    multivalued: true
  revised:
    name: revised
    definition_uri: https://w3id.org/reactome-ontology/revised
    description: Provenance links to explicit revision actions after prior curation
      or review.
    comments:
    - Useful for tracking editorial iteration.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:revised
    slot_uri: reactomeo:revised
    owner: event
    domain_of:
    - event
    range: instance_edit
    multivalued: true
  authored:
    name: authored
    definition_uri: https://w3id.org/reactome-ontology/authored
    description: Provenance links capturing authoring actions for the object.
    comments:
    - Included to support richer editorial provenance when present in exports.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:authored
    slot_uri: reactomeo:authored
    range: instance_edit
    multivalued: true
  in_taxon:
    name: in_taxon
    definition_uri: https://w3id.org/reactome-ontology/in_taxon
    description: Taxon in which the object, event, or entity is asserted to occur
      or be defined.
    comments:
    - For events this denotes the organism context; for entities it denotes the biological
      source organism.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:inTaxon
    slot_uri: reactomeo:inTaxon
    owner: physical_entity
    domain_of:
    - event
    - physical_entity
    range: organism_taxon
    multivalued: true
  located_in_compartment:
    name: located_in_compartment
    definition_uri: https://w3id.org/reactome-ontology/located_in_compartment
    description: Compartment in which an entity resides or an event occurs.
    comments:
    - In Reactome, compartment is identity-relevant for many physical entities.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:locatedInCompartment
    slot_uri: reactomeo:locatedInCompartment
    owner: physical_entity
    domain_of:
    - event
    - physical_entity
    range: compartment
    multivalued: true
  has_summation:
    name: has_summation
    definition_uri: https://w3id.org/reactome-ontology/has_summation
    description: Narrative summary object explaining the biology of an event or entity.
    comments:
    - Distinct from formal definition; usually prose intended for readers.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasSummation
    slot_uri: reactomeo:hasSummation
    owner: event
    domain_of:
    - event
    range: summation
    multivalued: false
  supported_by:
    name: supported_by
    definition_uri: https://w3id.org/reactome-ontology/supported_by
    description: Publication supporting the existence, mechanism, or curation of the
      object.
    comments:
    - Often points to PubMed-backed literature references.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:supportedBy
    slot_uri: reactomeo:supportedBy
    owner: regulation
    domain_of:
    - event
    - catalyst_activity
    - regulation
    range: publication
    multivalued: true
  has_cross_reference:
    name: has_cross_reference
    definition_uri: https://w3id.org/reactome-ontology/has_cross_reference
    description: External cross-reference to another database or controlled resource.
    comments:
    - Used for interoperating with identifiers from GO, ChEBI, UniProt, Ensembl, and
      related resources.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasCrossReference
    slot_uri: reactomeo:hasCrossReference
    owner: physical_entity
    domain_of:
    - event
    - physical_entity
    range: database_identifier
    multivalued: true
  has_disease_context:
    name: has_disease_context
    definition_uri: https://w3id.org/reactome-ontology/has_disease_context
    description: Disease context associated with an event or physical entity.
    comments:
    - Represents contextual disease association rather than broad etiologic modeling.
    from_schema: https://w3id.org/reactome-ontology/final
