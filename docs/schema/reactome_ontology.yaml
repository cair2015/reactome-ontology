    multivalued: false
  catalyst_activity_has_catalyst:
    name: catalyst_activity_has_catalyst
    definition_uri: https://w3id.org/reactome-ontology/has_catalyst
    description: Physical entity serving as the bearer of a catalyst activity.
    comments:
    - Used inside reified catalyst activity objects.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasCatalyst
    is_a: has_catalyst
    domain: catalyst_activity
    slot_uri: reactomeo:hasCatalyst
    alias: has_catalyst
    owner: catalyst_activity
    domain_of:
    - catalyst_activity
    is_usage_slot: true
    usage_slot_name: has_catalyst
    range: physical_entity
    required: true
    multivalued: false
  catalyst_activity_has_go_molecular_function:
    name: catalyst_activity_has_go_molecular_function
    definition_uri: https://w3id.org/reactome-ontology/has_go_molecular_function
    description: GO molecular function term asserted in a catalyst activity.
    comments:
    - Reactome reifies catalysis so the molecular function can be attached explicitly.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasGoMolecularFunction
