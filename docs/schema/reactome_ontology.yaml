    inlined_as_list: true
  entity_set_has_member:
    name: entity_set_has_member
    definition_uri: https://w3id.org/reactome-ontology/has_member
    description: Members of an entity set representing functionally interchangeable
      participants.
    comments:
    - Entity sets are curated graph objects, not simply OWL classes over their members.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasMember
    is_a: has_member
    domain: entity_set
    slot_uri: reactomeo:hasMember
    alias: has_member
    owner: entity_set
    domain_of:
    - entity_set
    is_usage_slot: true
    usage_slot_name: has_member
    range: physical_entity
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  reference_entity_has_reference_database:
    name: reference_entity_has_reference_database
    definition_uri: https://w3id.org/reactome-ontology/has_reference_database
    description: Reference database authority associated with a reference entity or
      database identifier.
    comments:
    - Provides the namespace and interpretation context for an identifier.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:hasReferenceDatabase
    is_a: has_reference_database
    domain: reference_entity
    slot_uri: reactomeo:hasReferenceDatabase
    alias: has_reference_database
    owner: reference_entity
    domain_of:
    - reference_entity
    is_usage_slot: true
    usage_slot_name: has_reference_database
    range: reference_database
