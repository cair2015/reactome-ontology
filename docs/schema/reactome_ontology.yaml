    - catalyst_activity
    is_usage_slot: true
    usage_slot_name: has_go_molecular_function
    range: go_molecular_function_term
    required: true
    multivalued: false
  regulation_has_regulator:
    name: regulation_has_regulator
    definition_uri: https://w3id.org/reactome-ontology/has_regulator
    description: Physical entity that exerts regulatory influence on a regulated event.
    comments:
    - May be a protein, complex, small molecule, set, or other physical entity.
