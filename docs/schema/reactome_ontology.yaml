    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:regulates
    is_a: regulates
    domain: regulation
    slot_uri: reactomeo:regulates
    alias: regulates
    owner: regulation
    domain_of:
    - regulation
    is_usage_slot: true
    usage_slot_name: regulates
