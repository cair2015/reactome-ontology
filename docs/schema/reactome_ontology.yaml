    required: true
    multivalued: false
classes:
  named_entity:
    name: named_entity
    definition_uri: https://w3id.org/reactome-ontology/NamedEntity
    description: Generic named entity used as a lightweight semantic root for serializable
      objects.
    comments:
    - Provides reusable identifier, naming, and descriptive slots independent of the
      Reactome-specific hierarchy.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:NamedEntity
    abstract: true
    slots:
    - id
    - name
    - description
    class_uri: reactomeo:NamedEntity
  database_object:
    name: database_object
    definition_uri: https://w3id.org/reactome-ontology/DatabaseObject
    description: Root class for most Reactome schema objects and the main provenance-bearing
      superclass.
    comments:
    - "Reactome\u2019s frame-based model uses DatabaseObject as the common ancestor\
      \ for curated graph records."
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:DatabaseObject
    is_a: named_entity
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    slot_usage:
      reactome_db_id:
        name: reactome_db_id
        required: true
      reactome_stable_identifier:
        name: reactome_stable_identifier
        required: true
      source_schema_class:
        name: source_schema_class
        required: true
      display_label:
        name: display_label
        required: true
      created:
        name: created
        required: true
    class_uri: reactomeo:DatabaseObject
  instance_edit:
    name: instance_edit
    definition_uri: https://w3id.org/reactome-ontology/InstanceEdit
    description: Provenance record describing a curation action such as creation,
      modification, review, or revision.
    comments:
    - Typically stores who performed an edit and when the edit occurred.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:InstanceEdit
    is_a: database_object
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    - instanceEdit__date
    - instanceEdit__author
    attributes:
      date:
        name: date
        description: Timestamp or date string for the edit activity.
        range: datetime
      author:
        name: author
        description: Person or people responsible for the edit activity.
        range: person
        multivalued: true
        inlined_as_list: true
    class_uri: reactomeo:InstanceEdit
  publication:
    name: publication
    definition_uri: https://w3id.org/reactome-ontology/Publication
    description: Publication record used as evidence or supporting documentation for
      curated biology.
    comments:
    - Abstract superclass for specific publication-like records.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:Publication
    is_a: database_object
    abstract: true
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    class_uri: reactomeo:Publication
  literature_reference:
    name: literature_reference
    definition_uri: https://w3id.org/reactome-ontology/LiteratureReference
    description: Literature citation record, commonly representing a PubMed-indexed
      paper supporting a Reactome assertion.
    comments:
    - Used widely to ground events, regulations, and catalyst activities in the literature.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:LiteratureReference
    is_a: publication
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    - pubmed_id
    class_uri: reactomeo:LiteratureReference
  person:
    name: person
    definition_uri: https://w3id.org/reactome-ontology/Person
    description: Person record used primarily for provenance, authorship, and curation
      attribution.
    comments:
    - May represent curators, reviewers, or contributors.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:Person
    is_a: database_object
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    - orcid
    class_uri: reactomeo:Person
  summation:
    name: summation
    definition_uri: https://w3id.org/reactome-ontology/Summation
    description: Narrative summary record containing prose that explains the biological
      meaning of an entity or event.
    comments:
    - Distinct from a formal definition; meant for human reading.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:Summation
    is_a: database_object
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
    - database_object_source_schema_class
    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    - summation__text
    attributes:
      text:
        name: text
        description: Narrative summary text.
        range: string
        required: true
    class_uri: reactomeo:Summation
  event:
    name: event
    definition_uri: https://w3id.org/reactome-ontology/Event
    description: Biological occurrence or process unit in Reactome, covering both
      pathways and reaction-like events.
    comments:
    - Event is one of the central abstractions in the Reactome model.
    from_schema: https://w3id.org/reactome-ontology/final
    mappings:
    - reactomeo:Event
    is_a: database_object
    abstract: true
    slots:
    - id
    - name
    - description
    - database_object_reactome_db_id
    - database_object_reactome_stable_identifier
