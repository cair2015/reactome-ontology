    - database_object_display_label
    - definition
    - previous_stable_identifier
    - database_object_created
    - modified
    - in_taxon
    - located_in_compartment
    - has_summation
    - has_cross_reference
    - has_disease_context
    - supported_by
    - reviewed
    - revised
    - release_date
    - release_status
    - is_inferred
